<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ReLine Dashboard</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f5f7fb;
        color: #1f2937;
      }
      .container {
        max-width: 1000px;
        margin: 0 auto;
        padding: 24px;
      }
      .card {
        background: white;
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        margin-bottom: 20px;
      }
      h1, h2 { margin-top: 0; }
      .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; }
      .stat { background: #eef2ff; border-radius: 12px; padding: 16px; }
      table { width: 100%; border-collapse: collapse; }
      th, td { text-align: left; padding: 10px; border-bottom: 1px solid #e5e7eb; }
      th { background: #f9fafb; }
      .muted { color: #6b7280; font-size: 0.95rem; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <h1>ReLine Dashboard</h1>
        <p class="muted">ดูสรุปรีไลน์และยอดเงินจากบอท Telegram</p>
      </div>

      <div class="card">
        <h2>สรุปรวม</h2>
        <div class="stats">
          <div class="stat">
            <div class="muted">จำนวนรายการ</div>
            <div id="totalCount">-</div>
          </div>
          <div class="stat">
            <div class="muted">จำนวนคน</div>
            <div id="userCount">-</div>
          </div>
          <div class="stat">
            <div class="muted">ยอดเงิน</div>
            <div id="totalAmount">-</div>
          </div>
        </div>
      </div>

      <div class="card">
        <h2>อันดับคนรีไลน์</h2>
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>ชื่อ</th>
              <th>ครั้ง</th>
              <th>เงิน</th>
            </tr>
          </thead>
          <tbody id="summaryBody"></tbody>
        </table>
      </div>

      <div class="card">
        <h2>รายการล่าสุด</h2>
        <table>
          <thead>
            <tr>
              <th>เวลา</th>
              <th>ชื่อ</th>
              <th>กลุ่ม</th>
            </tr>
          </thead>
          <tbody id="logBody"></tbody>
        </table>
      </div>
    </div>

    <script>
      async function loadData() {
        try {
          const summaryRes = await fetch("/summary");
          const summary = await summaryRes.json();

          const logsRes = await fetch("/logs");
          const logs = await logsRes.json();

          document.getElementById("totalCount").textContent = logs.length;
          document.getElementById("userCount").textContent = summary.length;
          document.getElementById("totalAmount").textContent = `${summary.reduce((sum, item) => sum + (item.amount || 0), 0)} บาท`;

          const body = document.getElementById("summaryBody");
          body.innerHTML = "";
          summary.forEach((item, index) => {
            const row = document.createElement("tr");
            row.innerHTML = `
              <td>${index + 1}</td>
              <td>${item.fullname || item.username || "ไม่ทราบชื่อ"}</td>
              <td>${item.total}</td>
              <td>${item.amount || item.total * 50} บาท</td>
            `;
            body.appendChild(row);
          });

          const logBody = document.getElementById("logBody");
          logBody.innerHTML = "";
          logs.slice(0, 10).forEach((item) => {
            const row = document.createElement("tr");
            row.innerHTML = `
              <td>${new Date(item.reline_time).toLocaleString("th-TH")}</td>
              <td>${item.fullname || item.username || "ไม่ทราบชื่อ"}</td>
              <td>${item.chat_title || "-"}</td>
            `;
            logBody.appendChild(row);
          });
        } catch (error) {
          console.error(error);
          document.getElementById("summaryBody").innerHTML = '<tr><td colspan="4">ไม่สามารถโหลดข้อมูลได้</td></tr>';
        }
      }

      loadData();
      setInterval(loadData, 10000);
    </script>
  </body>
</html>
